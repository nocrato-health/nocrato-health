name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via SSH
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          CLEAN_USER=$(printf '%s' "$VPS_USER" | tr -dc 'a-zA-Z0-9._-')
          CLEAN_HOST=$(printf '%s' "$VPS_HOST" | tr -dc 'a-zA-Z0-9.:_-')
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            -l "$CLEAN_USER" "$CLEAN_HOST" \
            'set -e
            APP_DIR="/opt/nocrato-health-v2"
            COMPOSE="docker compose -f $APP_DIR/docker/docker-compose.prod.yml --env-file $APP_DIR/.env"
            echo "==> git pull"
            cd $APP_DIR
            git pull origin main
            echo "==> build"
            $COMPOSE build
            echo "==> migrations"
            $COMPOSE run --rm -e NODE_ENV=production api node dist/database/migrate.js
            echo "==> up"
            $COMPOSE up -d
            echo "==> backup cron (TD-10)"
            mkdir -p /opt/backups/nocrato-uploads
            if ! crontab -l 2>/dev/null | grep -q "backup-uploads"; then
              (crontab -l 2>/dev/null; echo "0 3 * * * /opt/nocrato-health-v2/scripts/backup-uploads.sh >> /var/log/nocrato-backup.log 2>&1") | crontab -
            fi
            echo "==> done"'
