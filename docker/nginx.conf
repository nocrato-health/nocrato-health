# ──────────────────────────────────────────────
# Nocrato Health V2 — Nginx reverse proxy
# Hostinger VPS — app.nocrato.com
#
# Topologia:
#   internet → nginx:443 → web:80 (React estático)
#                        → api:3000 (NestJS)
#   uploads servidos diretamente pelo nginx via volume compartilhado
# ──────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Formato de log com IP real do cliente
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip para respostas da API e assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Tamanho máximo de upload (documentos clínicos)
    client_max_body_size 20m;

    # Rate limiting — zonas definidas no contexto http, aplicadas por location
    # api_general: 30 req/min por IP para endpoints da API
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
    # webhook: 60 req/min por IP para o webhook do Evolution API (mensagens WhatsApp)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;
    # Retorna 429 (Too Many Requests) em vez do padrão 503
    limit_req_status 429;

    # Upstream da API NestJS (nome do serviço no docker-compose)
    upstream api {
        server api:3000;
        keepalive 16;
    }

    # Upstream do frontend React (nome do serviço no docker-compose)
    upstream web {
        server web:80;
        keepalive 8;
    }

    # ──────────────────────────────────────────
    # HTTP → HTTPS redirect
    # ──────────────────────────────────────────
    server {
        listen 80;
        server_name app.nocrato.com;

        # Certbot ACME challenge (necessário na renovação do certificado)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────
    # HTTPS — servidor principal
    # ──────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name app.nocrato.com;

        # Certificados gerados pelo Certbot (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/app.nocrato.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.nocrato.com/privkey.pem;

        # Configurações SSL modernas (TLS 1.2+ apenas)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Headers de segurança
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://app.nocrato.com; frame-ancestors 'none';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ──────────────────────────────────────
        # API NestJS — /api/* e /health
        # ──────────────────────────────────────

        # Webhook do Evolution API — rate limit mais alto (burst permite rafagas de mensagens)
        location /api/v1/agent/webhook {
            limit_req zone=webhook burst=20 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Demais endpoints da API — rate limit conservador (30r/m, burst de 10)
        location /api/ {
            limit_req zone=api_general burst=10 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeout generoso para endpoints de IA (agente WhatsApp com OpenAI)
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Health check sem prefixo /api/v1 (configurado em main.ts)
        location /health {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────
        # SEC-10 fix: uploads NÃO são mais servidos pelo nginx.
        # Documentos clínicos agora são servidos exclusivamente via endpoints
        # autenticados do NestJS:
        #   - GET /api/v1/doctor/documents/:id          (JWT — portal do doutor)
        #   - GET /api/v1/patient/portal/documents/:id  (code — portal do paciente)
        # Ambos usam res.download() após validar acesso + isolamento de tenant.
        # O volume uploads_data continua montado apenas no container `api` (read+write).
        # ──────────────────────────────────────

        # ──────────────────────────────────────
        # Frontend React — SPA (catch-all)
        # ──────────────────────────────────────
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
