services:
  postgres:
    image: postgres:16-alpine
    container_name: nocrato_postgres
    environment:
      POSTGRES_DB: nocrato_health
      POSTGRES_USER: nocrato
      POSTGRES_PASSWORD: nocrato_secret
      # Passado para o init script 01-bugsink.sh. Só tem efeito no primeiro boot
      # (volume vazio). Para volumes já existentes, criar manualmente — ver CLAUDE.md.
      BUGSINK_DB_PASSWORD: ${BUGSINK_DB_PASSWORD:-}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocrato -d nocrato_health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nocrato_network
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Bugsink — Self-hosted error tracking (LGPD fase 0)
  # Reusa o Postgres existente via DATABASE_URL. Acesso apenas em localhost.
  # ──────────────────────────────────────────
  bugsink:
    image: bugsink/bugsink:2
    container_name: nocrato_bugsink
    depends_on:
      postgres:
        condition: service_healthy
    # Bind em 127.0.0.1 apenas — nunca expor publicamente.
    # Em prod, manter o mesmo padrão e acessar via SSH tunnel.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      SECRET_KEY: ${BUGSINK_SECRET_KEY}
      CREATE_SUPERUSER: ${BUGSINK_ADMIN_EMAIL}:${BUGSINK_ADMIN_PASSWORD}
      PORT: 8000
      DATABASE_URL: postgresql://bugsink:${BUGSINK_DB_PASSWORD}@postgres:5432/bugsink
      BEHIND_HTTPS_PROXY: "false"
      USE_X_FORWARDED_HOST: "false"
      BASE_URL: ${BUGSINK_BASE_URL:-http://localhost:8000}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import requests; requests.get(\"http://localhost:8000/\").raise_for_status()' || exit 1"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s
    networks:
      - nocrato_network
    restart: unless-stopped

networks:
  nocrato_network:
    name: nocrato_dev_network

volumes:
  postgres_data:
    name: nocrato_postgres_data
